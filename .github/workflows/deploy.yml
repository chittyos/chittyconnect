# ChittyConnect CI/CD — aligned with chittyos/chittyops conventions
#
# NOTE: chittyconnect cannot use reusable-worker-deploy.yml because that
# workflow calls getchitty-creds → connect.chitty.cc/credentials/deploy
# to fetch ephemeral CF tokens.  ChittyConnect IS the credential provider,
# so it must deploy with static CLOUDFLARE_API_TOKEN (chicken-and-egg).
#
# Structure mirrors the reusable workflow: validate → deploy → verify.

name: Deploy ChittyConnect

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-chittyconnect-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  #########################################
  # Validate & Migrate
  #########################################
  validate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Validate OpenAPI
        run: |
          SPEC="openapi.json"
          [ ! -f "$SPEC" ] && [ -f "public/openapi.json" ] && SPEC="public/openapi.json"
          [ -f "$SPEC" ] && npx @redocly/cli lint "$SPEC" || echo "No OpenAPI spec"

      - name: Validate MCP Manifest
        run: |
          [ -f "mcp/manifest.json" ] && [ -f "mcp/manifest.schema.json" ] && \
            npx ajv validate -s mcp/manifest.schema.json -d mcp/manifest.json || \
            echo "MCP manifest validation skipped"

      - name: Run D1 Migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -d migrations ]; then
            for migration in migrations/*.sql; do
              if [ -f "$migration" ]; then
                echo "Applying $migration..."
                npx wrangler d1 execute chittyconnect --file "$migration" --remote || echo "Migration may already be applied"
              fi
            done
          fi

  #########################################
  # Deploy to Cloudflare Workers
  #########################################
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production

  #########################################
  # Post-deploy verification + rollback
  #########################################
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: wrangler.jsonc

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify Deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Cloudflare WAF blocks GitHub Actions IPs (403), so we verify
          # via the Cloudflare API instead of curling public endpoints.
          echo "Checking deployment status via Cloudflare API..."

          RESPONSE=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/chittyconnect/deployments" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}") || {
            echo "::error::Failed to query Cloudflare deployments API"
            exit 1
          }

          VERSION=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          deployments = data.get('result', {}).get('deployments', [])
          if deployments:
              latest = deployments[0]
              for v in latest.get('versions', []):
                  print(v.get('version_id', 'unknown'))
          else:
              print('none')
          ")

          echo "Active deployment version: $VERSION"
          [ "$VERSION" != "none" ] && echo "Deployment verified" || {
            echo "::error::No active deployment found — rolling back..."
            npx wrangler@latest rollback -y
            exit 1
          }

      # Smoke-test that /health actually responds. The deployments API only
      # confirms a deployment record exists — it does NOT detect runtime
      # instantiation failures (e.g., a binding the account isn't entitled to,
      # which surfaces as Cloudflare error 1101 on every request even though
      # the deploy "succeeded").
      #
      # The zone WAF 403's GitHub Actions runner IPs, so we can't always reach
      # the public URL from here. Treatment:
      #   - 200 with body containing "status" → pass
      #   - 5xx (incl. 1101) → ROLLBACK and fail the deploy
      #   - 403 / 4xx / network error → inconclusive, warn but don't block
      # The 5xx case is the one that catches the real failure mode; 403 from
      # WAF still tells us the worker is reachable at the edge.
      - name: Smoke check /health
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          URL="https://connect.chitty.cc/health"
          echo "Probing $URL"

          last_code="000"
          for attempt in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /tmp/health.body -w "%{http_code}" --max-time 8 "$URL" || echo "000")
            BODY=$(head -c 300 /tmp/health.body 2>/dev/null || true)
            echo "Attempt $attempt: HTTP $HTTP_CODE — $BODY"
            last_code="$HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"status"'; then
              echo "✅ /health returned 200 with status field"
              exit 0
            fi
            # Hard-fail fast on 5xx (Cloudflare error 1101 surfaces here)
            if [ "$HTTP_CODE" -ge 500 ] 2>/dev/null && [ "$HTTP_CODE" -lt 600 ] 2>/dev/null; then
              echo "::error::/health returned $HTTP_CODE on attempt $attempt — Worker is broken"
              echo "Rolling back deployment..."
              npx wrangler@latest rollback -y --name chittyconnect || echo "::warning::rollback command failed; rollback manually with 'wrangler rollback --name chittyconnect'"
              exit 1
            fi
            if [ $attempt -lt 5 ]; then sleep 5; fi
          done

          # Got here without a 200 and without a 5xx (likely WAF 403 or timeout).
          # Don't fail the deploy on this signal alone — operator should verify.
          echo "::warning::/health did not return 200 (last: $last_code). Likely WAF block on runner IP — verify manually with: curl -i https://connect.chitty.cc/health"

      - name: Register with ChittyRegistry
        run: |
          curl -sf -X POST https://registry.chitty.cc/api/services/chittyconnect/heartbeat \
            -H "Content-Type: application/json" \
            -d '{"status":"deployed","version":"${{ github.sha }}"}' || true
        continue-on-error: true

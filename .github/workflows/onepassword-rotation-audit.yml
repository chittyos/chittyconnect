name: 1Password Rotation Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotation-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit secret catalog freshness
        run: |
          set -e

          if [ ! -f .github/secret-catalog.json ]; then
            echo "::error::Missing .github/secret-catalog.json"
            exit 1
          fi

          # Verify catalog is valid JSON
          jq empty .github/secret-catalog.json || { echo "::error::Invalid JSON in secret-catalog.json"; exit 1; }

          # Count secrets in catalog
          count=$(jq '.secrets | length' .github/secret-catalog.json)
          echo "Secret catalog contains $count entries"

          # Check for secrets without rotation_days
          unrotated=$(jq '[.secrets[] | select(.rotation_days == null)] | length' .github/secret-catalog.json)
          if [ "$unrotated" -gt 0 ]; then
            echo "::warning::$unrotated secrets have no rotation schedule"
          fi

          # Verify allowed-workflow-secrets alignment
          if [ -f .github/allowed-workflow-secrets.txt ]; then
            echo "Allowed workflow secrets:"
            cat .github/allowed-workflow-secrets.txt
          fi

          echo "1Password rotation audit complete"

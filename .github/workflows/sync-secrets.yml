name: Sync Secrets (1Password → Cloudflare)

# Data Diode: reads from 1Password via sa-chitty-admin-{env},
# writes to Cloudflare Secrets via wrangler.
#
# This is the provisioning bot for the synthetic dev team.
# Runs manually or on demand — NOT on a schedule (rotation is handled
# by the SecretRotationService cron in ChittyConnect itself).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - prod
          - dev
      secrets_to_sync:
        description: "Comma-separated secret names (or 'all' for full sync)"
        required: true
        default: "all"
      dry_run:
        description: "Dry run — show what would be synced without writing"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

# Secret catalog: maps 1Password environment variable names to Cloudflare secret names.
# The 1Password environment (chitty-app-{env}) provides these via `op run`.
env:
  CF_ACCOUNT_ID: "0bc21e3a5a9de1a4cc843be9c3e98121"

jobs:
  sync:
    name: "Sync to ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Define secret catalog
        id: catalog
        run: |
          # Each line: OP_ENV_VAR_NAME:CF_SECRET_NAME
          # These vars are populated by `op run --environment chitty-app-{env}`
          cat > /tmp/secret-catalog.txt <<'CATALOG'
          NEON_DATABASE_URL:NEON_DATABASE_URL
          GDRIVE_CLIENT_ID:GDRIVE_CLIENT_ID
          GDRIVE_CLIENT_SECRET:GDRIVE_CLIENT_SECRET
          GDRIVE_REFRESH_TOKEN:GDRIVE_REFRESH_TOKEN
          CHITTY_AUTH_SERVICE_TOKEN:CHITTY_AUTH_SERVICE_TOKEN
          ONEPASSWORD_CONNECT_TOKEN:ONEPASSWORD_CONNECT_TOKEN
          ONEPASSWORD_CONNECT_HOST:ONEPASSWORD_CONNECT_HOST
          CATALOG

          # Strip whitespace
          sed -i 's/^[[:space:]]*//' /tmp/secret-catalog.txt
          sed -i '/^$/d' /tmp/secret-catalog.txt

          echo "Catalog entries:"
          wc -l < /tmp/secret-catalog.txt

      - name: Sync secrets
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_ADMIN_SA_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          DRY_RUN="${{ inputs.dry_run }}"
          REQUESTED="${{ inputs.secrets_to_sync }}"

          echo "Environment: $ENV"
          echo "Dry run: $DRY_RUN"
          echo "Requested: $REQUESTED"
          echo "---"

          synced=0
          skipped=0
          failed=0

          while IFS=: read -r op_var cf_name; do
            [ -z "$op_var" ] && continue

            # Filter if specific secrets requested
            if [ "$REQUESTED" != "all" ]; then
              if ! echo ",$REQUESTED," | grep -q ",$cf_name,"; then
                echo "SKIP $cf_name (not in request list)"
                skipped=$((skipped + 1))
                continue
              fi
            fi

            echo -n "SYNC $cf_name ... "

            if [ "$DRY_RUN" = "true" ]; then
              echo "DRY RUN (would sync from $op_var)"
              skipped=$((skipped + 1))
              continue
            fi

            # Read from 1Password environment, write to Cloudflare
            if op run --environment "chitty-app-$ENV" -- sh -c "echo \"\$$op_var\"" | \
               wrangler secret put "$cf_name" --name chittyconnect 2>/dev/null; then
              echo "OK"
              synced=$((synced + 1))
            else
              echo "FAILED"
              failed=$((failed + 1))
            fi
          done < /tmp/secret-catalog.txt

          echo "---"
          echo "Results: $synced synced, $skipped skipped, $failed failed"

          if [ "$failed" -gt 0 ]; then
            echo "::warning::$failed secrets failed to sync"
          fi

      - name: Verify connectivity
        if: inputs.dry_run == false
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Verifying secrets are set..."
          wrangler secret list --name chittyconnect 2>/dev/null | head -20 || echo "Could not list secrets"
          echo "---"
          echo "Sync complete. Secrets are now available to chittyconnect worker."

# 1Password → Cloudflare Secrets Store sync (F-022 / SOP-080)
#
# Runs nightly + on push to wrangler.jsonc. Reads canonical secret list from
# 1Password vaults (per ONEPASSWORD_VAULT_INFRASTRUCTURE / _SERVICES / _INTEGRATIONS / _EMERGENCY),
# diffs against current CF Secrets Store entries, pushes missing/changed values.
#
# Refs:
#   - SOP-080 (Credential Lifecycle & Rotation)
#   - F-022 in 2026-05-26 ecosystem audit
#
# Required GitHub Secrets:
#   - OP_SERVICE_ACCOUNT_TOKEN: 1Password Service Account with read on all 4 vaults
#   - CLOUDFLARE_API_TOKEN: scope Secrets:Edit, Workers:Edit
#   - CLOUDFLARE_ACCOUNT_ID: 0bc21e3a5a9de1a4cc843be9c3e98121

name: Sync 1P → CF Secrets

on:
  schedule:
    - cron: "30 6 * * *"   # nightly 06:30 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["wrangler.jsonc"]

permissions:
  contents: read

concurrency:
  group: secrets-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: secrets-sync
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Configure 1Password Service Account
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          op vault list --format=json > /tmp/op-vaults.json
          jq -r ".[].name" /tmp/op-vaults.json | head

      - name: Discover required CF secrets from wrangler.jsonc
        id: discover
        run: |
          jq -r ".env | to_entries | .[] | .value.secrets_store_secrets[]? | .secret_name" wrangler.jsonc \
            | sort -u > /tmp/required-secrets.txt
          echo "Required secrets count: $(wc -l < /tmp/required-secrets.txt)"
          cat /tmp/required-secrets.txt

      - name: Resolve canonical values from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          # For each secret name, look up canonical 1Password reference
          # Per SOP-080 T1: every secret has a canonical 1Password item
          mkdir -p /tmp/secrets
          while read -r name; do
            # Convention: secret_name maps to op://Infrastructure/<name>/value (or Services/Integrations/Emergency)
            for vault in Infrastructure Services Integrations Emergency; do
              if op item get "$name" --vault "$vault" --fields value 2>/dev/null > /tmp/secrets/"$name"; then
                echo "✓ resolved: $name from $vault"
                break
              fi
            done
          done < /tmp/required-secrets.txt

      - name: Diff against CF Secrets Store + push missing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # CF Secrets Store list endpoint
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/secrets_store/stores/e914522471964c3c8cf1e601770edcc3/secrets" \
            | jq -r ".result[].name" | sort > /tmp/cf-secrets.txt

          # Push secrets that are in 1Password but missing or stale in CF
          while read -r name; do
            if [ -f "/tmp/secrets/$name" ]; then
              # PUT to CF Secrets Store
              value=$(cat "/tmp/secrets/$name")
              curl -s -X PUT \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"value\":$(jq -Rs . <<< "$value")}" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/secrets_store/stores/e914522471964c3c8cf1e601770edcc3/secrets/$name" \
                | jq -r ".success"
              echo "synced: $name"
            fi
          done < /tmp/required-secrets.txt

      - name: Log to ChittyLedger
        if: success()
        env:
          LEDGER_TOKEN: ${{ secrets.CHITTYLEDGER_WRITE_TOKEN }}
        run: |
          # Per SOP-118 — log E/SecretSynced event
          curl -s -X POST \
            -H "Authorization: Bearer $LEDGER_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"event_kind\":\"E/SecretSynced\",\"actor_chittyid\":\"did:chitty:foundation:gha-secrets-sync\",\"occurred_at\":\"$(date -u +%FT%TZ)\",\"payload\":{\"workflow_run\":\"${{ github.run_id }}\"}}" \
            "https://ledger.chitty.cc/api/v1/append" || true
